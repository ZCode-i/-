<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单登陆</title>
</head>
<style>
   body {
    background-color: #333;    /* 背景深色 */
    margin: 0;
    display: flex;             /* 开启弹性布局 */
    justify-content: center;   /* 水平居中 */
    align-items: center;       /* 垂直居中 */
    height: 100vh;             /* 占满整个浏览器高度 */
}

.login-box {
    background-color: white;   /* 方块颜色 */
    width: 380px;              /* 方块宽度 */
    padding: 40px;             /* 内部留白 */
    border-radius: 10px;       /* 圆角 */
    box-shadow: 0 10px 25px rgba(0,0,0,0.5); /* 增加阴影，更有立体感 */
}

/* 让输入框和按钮更整齐 */
input, .login-btn {
    width: 100%;               /* 宽度占满方块 */
    margin-top: 15px;
    padding: 12px;
    box-sizing: border-box;    /* 关键：防止 padding 撑破方块 */
    border-radius: 5px;
    border: 1px solid #ddd;
}

.login-btn {
    background-color: #28a745; /* 宝塔绿 */
    color: white;
    border: none;
    cursor: pointer;
    font-size: 16px;
}
p{
    text-align: center;
    margin-bottom: 20px;
}
 div.zh a{
    color: #28a745;
 }
</style>
<body>
  <div class="login-box">
      <p>用户登陆</p >
      
      <div class="urename">
          <input type="text" placeholder="账户">
          <input type="password" placeholder="密码">
      </div>
      
      <button class="login-btn">登录</button>
      
      <div class="zh">
          <a href=" ">注册</a >
          <a href="#">联系客服</a >
          <a href="#">忘记密码</a >
      </div>
  </div>
</body>
</html>
